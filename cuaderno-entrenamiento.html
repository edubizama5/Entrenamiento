<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno de Entrenamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch: #0F221B;
    --pitch-2: #16302A;
    --card: #1B3A31;
    --card-line: #2B4E43;
    --chalk: #ECE7DA;
    --chalk-dim: #A9BDB2;
    --clay: #C9622B;
    --clay-light: #E8935E;
    --gold: #D8B65C;
    --danger: #C9622B;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--pitch);
    color: var(--chalk);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px 40px;}

  header.top{
    padding: 22px 4px 18px;
    border-bottom:1px solid var(--card-line);
    margin-bottom:18px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color: var(--clay-light);
    margin-bottom:6px;
  }
  h1{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size:30px;
    letter-spacing:.01em;
    margin:0 0 4px;
    text-transform:uppercase;
  }
  .sub{
    color: var(--chalk-dim);
    font-size:13.5px;
    line-height:1.5;
  }

  .tabs{
    display:flex;
    gap:8px;
    margin:20px 0 6px;
  }
  .tab{
    flex:1;
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:.04em;
    font-size:15px;
    font-weight:600;
    padding:12px 10px;
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius: 10px;
    color: var(--chalk-dim);
    cursor:pointer;
    text-align:center;
    transition: all .15s ease;
  }
  .tab.active{
    background: var(--clay);
    border-color: var(--clay);
    color: #1B0E06;
  }
  .day-meta{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color: var(--chalk-dim);
    padding: 10px 2px 22px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px dashed var(--card-line);
    margin-bottom:20px;
  }

  .block-header{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin: 30px 0 12px;
  }
  .block-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:.1em;
    padding:3px 8px;
    border-radius:5px;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .block-tag.fijo{ background: rgba(216,182,92,.15); color: var(--gold); border:1px solid rgba(216,182,92,.4);}
  .block-tag.rotativo{ background: rgba(201,98,43,.15); color: var(--clay-light); border:1px solid rgba(201,98,43,.4);}
  .block-title{
    font-family:'Oswald', sans-serif;
    font-size:16.5px;
    text-transform:uppercase;
    letter-spacing:.03em;
    color: var(--chalk);
  }
  .block-note{
    font-size:12px;
    color: var(--chalk-dim);
    margin: -6px 0 14px;
    line-height:1.5;
  }

  .card{
    background: var(--card);
    border:1px solid var(--card-line);
    border-radius: var(--radius);
    padding:14px 14px 16px;
    margin-bottom:10px;
  }
  .card-top{
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .icon-box{
    flex:0 0 56px;
    width:56px;height:56px;
    border-radius:10px;
    background: var(--pitch-2);
    border:1px solid var(--card-line);
    display:flex;align-items:center;justify-content:center;
  }
  .icon-box svg{width:36px;height:36px;stroke:var(--clay-light);}
  .card-info{flex:1;min-width:0;}
  .ex-name{
    font-family:'Oswald', sans-serif;
    font-size:16px;
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:.01em;
    margin:0 0 3px;
  }
  .ex-meta{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color: var(--gold);
    margin-bottom:6px;
  }
  .ex-cue{
    font-size:12.5px;
    color: var(--chalk-dim);
    line-height:1.5;
  }
  .yt-btn{
    display:inline-block;
    margin-top:9px;
    font-family:'Oswald',sans-serif;
    font-size:11.5px;
    font-weight:500;
    letter-spacing:.03em;
    text-transform:uppercase;
    color: var(--clay-light);
    text-decoration:none;
    border:1px solid var(--clay);
    border-radius:7px;
    padding:5px 11px;
    transition: all .15s ease;
  }
  .yt-btn:active{ background: var(--clay); color:#1B0E06; }
  .ex-time{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color: var(--chalk-dim);
    flex:0 0 auto;
    text-align:right;
  }

  .log-row{
    display:flex;
    gap:8px;
    margin-top:12px;
    align-items:center;
  }
  .log-row input{
    background: var(--pitch-2);
    border:1px solid var(--card-line);
    border-radius:8px;
    color: var(--chalk);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    padding:8px 10px;
    width:0;
    flex:1;
  }
  .log-row input::placeholder{color:#5C7267;}
  .log-row button{
    background: var(--clay);
    border:none;
    color:#1B0E06;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    text-transform:uppercase;
    font-size:12px;
    letter-spacing:.03em;
    border-radius:8px;
    padding:9px 14px;
    cursor:pointer;
    flex:0 0 auto;
  }
  .log-row button:active{transform:scale(.97);}
  .history{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:9px;
  }
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color: var(--chalk-dim);
    background: var(--pitch-2);
    border:1px solid var(--card-line);
    padding:3px 7px;
    border-radius:6px;
  }
  .chip.latest{color:var(--clay-light);border-color:var(--clay);}

  .rule-box{
    margin-top:26px;
    padding:14px 16px;
    background: rgba(216,182,92,.08);
    border:1px solid rgba(216,182,92,.3);
    border-radius: var(--radius);
    font-size:12.5px;
    color: var(--chalk-dim);
    line-height:1.6;
  }
  .rule-box b{color:var(--gold);}

  .footer-note{
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:#5C7267;
    margin-top:30px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="eyebrow">Fútbol · Tenis · Golf</div>
    <h1>Cuaderno de Entrenamiento</h1>
    <div class="sub">Fuerza, rotación y fluidez. Anota tus pesos cada semana y ve tu progreso.</div>
  </header>

  <div class="tabs">
    <div class="tab active" data-day="martes">Martes</div>
    <div class="tab" data-day="jueves">Jueves</div>
  </div>
  <div class="day-meta">
    <span id="day-focus"></span>
    <span id="day-time"></span>
  </div>

  <div id="content"></div>

  <div class="footer-note">Los datos quedan guardados en este dispositivo/artefacto — se suman cada vez que registras un peso.</div>
</div>

};

const RULES = {
  martes: `<b>Regla clave:</b> rota y flexiona siempre desde cadera/torácica, nunca desde la lumbar. Molestia en glúteo/isquio = normal. Molestia específica en zona baja de la espalda = señal de alerta, ajusta peso o rango.`,
  jueves: `<b>Regla clave:</b> si sientes que tu lumbar "hace el trabajo" en vez de acompañar, para y baja carga. Molestia en lumbar baja durante el bloque rotacional = alerta.`
};

let currentDay = 'martes';
let store = {};

async function loadStore(){
  try{
    const res = await window.storage.get('training-log');
    store = res ? JSON.parse(res.value) : {};
  }catch(e){ store = {}; }
}

async function saveEntry(exId, weight, reps){
  if(!weight && !reps) return;
  const today = new Date().toISOString().slice(0,10);
  if(!store[exId]) store[exId] = [];
  store[exId].push({date: today, weight: weight||'', reps: reps||''});
  if(store[exId].length > 12) store[exId] = store[exId].slice(-12);
  try{
    await window.storage.set('training-log', JSON.stringify(store));
  }catch(e){ console.error('No se pudo guardar', e); }
  render();
}

function iconSvg(id){
  return `<svg viewBox="0 0 24 24"><use href="#${id}"/></svg>`;
}

function historyChips(exId){
  const entries = store[exId] || [];
  if(entries.length===0) return `<div class="history"><span class="chip">Sin registros aún</span></div>`;
  const last = entries.slice(-4).reverse();
  return `<div class="history">${last.map((e,i)=>{
    const label = [e.weight?e.weight+'kg':null, e.reps?e.reps+'r':null].filter(Boolean).join(' · ') || '—';
    const d = e.date.slice(5);
    return `<span class="chip ${i===0?'latest':''}">${d}: ${label}</span>`;
  }).join('')}</div>`;
}

function exerciseCard(ex){
  const ytQuery = encodeURIComponent(ex.yt || (ex.name + ' exercise'));
  const ytUrl = `https://www.youtube.com/results?search_query=${ytQuery}`;
  return `
  <div class="card">
    <div class="card-top">
      <div class="icon-box">${iconSvg(ex.icon)}</div>
      <div class="card-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">${ex.meta}</div>
        <div class="ex-cue">${ex.cue}</div>
        <a class="yt-btn" href="${ytUrl}" target="_blank" rel="noopener">▶ Ver video</a>
      </div>
      <div class="ex-time">${ex.time}</div>
    </div>
    <div class="log-row">
      <input type="text" inputmode="decimal" placeholder="kg" id="w-${ex.id}">
      <input type="text" inputmode="numeric" placeholder="reps" id="r-${ex.id}">
      <button onclick="handleSave('${ex.id}')">Guardar</button>
    </div>
    ${historyChips(ex.id)}
  </div>`;
}

function blockHtml(block){
  const tagHtml = block.tag ? `<span class="block-tag ${block.tag}">${block.tag}</span>` : '';
  const noteHtml = block.note ? `<div class="block-note">${block.note}</div>` : '';
  return `
    <div class="block-header">${tagHtml}<span class="block-title">${block.title}</span></div>
    ${noteHtml}
    ${block.exs.map(exerciseCard).join('')}
  `;
}

function render(){
  const d = DATA[currentDay];
  document.getElementById('day-focus').textContent = d.focus;
  document.getElementById('day-time').textContent = d.time;
  document.getElementById('content').innerHTML =
    d.blocks.map(blockHtml).join('') +
    `<div class="rule-box">${RULES[currentDay]}</div>`;
}

function handleSave(exId){
  const w = document.getElementById('w-'+exId).value.trim();
  const r = document.getElementById('r-'+exId).value.trim();
  saveEntry(exId, w, r);
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentDay = tab.dataset.day;
    render();
  });
});

(async function init(){
  await loadStore();
  render();
})();
</script>
</body>
</html>
